name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ChronoPath
        run: |
          python -m pip install --upgrade pip setuptools
          pip install "protobuf>=4.25.8,<8.0.0"
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ChronoPath
        run: pytest tests/
